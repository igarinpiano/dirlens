# Rust 版 dirlens のリリースビルド。
#
# タグ（rust-v*）または手動起動で:
#   1. 5 ターゲットの release バイナリをビルド（各 OS のネイティブ runner）
#   2. npm パッケージ群（dirlens + dirlens-bin-*）を組み立てて artifacts に保存
#   3. GitHub Release（draft）にバイナリの tar.gz/zip を添付
#
# 【重要】npm / PyPI への公開はここでは行わない。公開は所有者が artifacts を
# 確認したうえで手動で行う（CLAUDE.md「Publishing / releases」参照）。
name: rust-release

on:
  push:
    tags: ["rust-v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "バージョン（例: 1.0.0）。省略時はタグ名 rust-vX.Y.Z から取る"
        required: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-13
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Build (release)
        working-directory: rust
        run: cargo build --release -p dirlens-cli --target ${{ matrix.target }}
      - name: Collect
        run: |
          mkdir -p out/${{ matrix.target }}
          exe=dirlens; [[ "${{ matrix.target }}" == *windows* ]] && exe=dirlens.exe
          cp "rust/target/${{ matrix.target }}/release/$exe" "out/${{ matrix.target }}/"
      - uses: actions/upload-artifact@v7
        with:
          name: bin-${{ matrix.target }}
          path: out/

  assemble:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: bin-*
          merge-multiple: true
          path: binaries
      - name: Resolve version
        id: ver
        run: |
          v="${{ github.event.inputs.version }}"
          if [ -z "$v" ]; then v="${GITHUB_REF_NAME#rust-v}"; fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - name: Assemble npm packages
        run: |
          python3 rust/npm/assemble.py \
            --version "${{ steps.ver.outputs.version }}" \
            --binaries binaries --out npm-out
      - name: Pack (dry run)
        run: |
          for d in npm-out/*/; do (cd "$d" && npm pack --dry-run); done
      - uses: actions/upload-artifact@v7
        with:
          name: npm-packages
          path: npm-out/
      - name: Archive binaries for GitHub Release
        run: |
          mkdir -p release
          for t in binaries/*/; do
            t="${t%/}"; name="dirlens-${{ steps.ver.outputs.version }}-$(basename "$t")"
            if [ -f "$t/dirlens.exe" ]; then
              (cd "$t" && zip -q "../../release/$name.zip" dirlens.exe)
            else
              tar -czf "release/$name.tar.gz" -C "$t" dirlens
            fi
          done
      - name: Create draft GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --draft \
            --title "dirlens (Rust) ${{ steps.ver.outputs.version }}" \
            release/*
