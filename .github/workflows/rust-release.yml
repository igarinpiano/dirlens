# Rust 版 dirlens のリリースビルド。
#
# 自動トリガーは無し（GitHub Release はまだ運用開始していないため）。
# GitHub → Actions → このワークフロー → Run workflow のボタン操作でのみ実行する:
#   1. 5 ターゲットの release バイナリをビルド（各 OS のネイティブ runner）
#   2. npm パッケージ群（dirlens + dirlens-bin-*）を組み立てて artifacts に保存
#   3. GitHub Release（draft）を作成し、タグ（vX.Y.Z）とバイナリの tar.gz/zip を添付
#      （タグを事前に push 済みならそれを使う。無ければこの実行時点の main に打つ）
#
# 【重要】npm / PyPI への公開はここでは行わない（別ワークフロー npm-publish.yml /
# pypi-publish.yml が担当）。公開は所有者が artifacts を確認したうえで手動で行う。
name: rust-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "確認用バージョン（例: 1.1.0）。rust/Cargo.toml の値と一致しないと失敗する。空欄なら確認をスキップ"
        required: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-13
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Build (release)
        working-directory: rust
        run: cargo build --release -p dirlens-cli --target ${{ matrix.target }}
      - name: Collect
        run: |
          mkdir -p out/${{ matrix.target }}
          exe=dirlens; [[ "${{ matrix.target }}" == *windows* ]] && exe=dirlens.exe
          cp "rust/target/${{ matrix.target }}/release/$exe" "out/${{ matrix.target }}/"
      - uses: actions/upload-artifact@v7
        with:
          name: bin-${{ matrix.target }}
          path: out/

  assemble:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: bin-*
          merge-multiple: true
          path: binaries
      - name: Resolve version
        id: ver
        run: |
          v="$(grep -m1 '^version' rust/Cargo.toml | sed -E 's/version = "(.*)"/\1/')"
          if [ -n "${{ github.event.inputs.version }}" ] && [ "${{ github.event.inputs.version }}" != "$v" ]; then
            echo "::error::rust/Cargo.toml の version ($v) と入力値 (${{ github.event.inputs.version }}) が一致しません。先に Cargo.toml を更新してください。"
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - name: Assemble npm packages
        run: |
          python3 rust/npm/assemble.py \
            --version "${{ steps.ver.outputs.version }}" \
            --binaries binaries --out npm-out
      - name: Pack (dry run)
        run: |
          for d in npm-out/*/; do (cd "$d" && npm pack --dry-run); done
      - uses: actions/upload-artifact@v7
        with:
          name: npm-packages
          path: npm-out/
      - name: Archive binaries for GitHub Release
        run: |
          mkdir -p release
          for t in binaries/*/; do
            t="${t%/}"; name="dirlens-${{ steps.ver.outputs.version }}-$(basename "$t")"
            if [ -f "$t/dirlens.exe" ]; then
              (cd "$t" && zip -q "../../release/$name.zip" dirlens.exe)
            else
              tar -czf "release/$name.tar.gz" -C "$t" dirlens
            fi
          done
      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # タグ v${version} が既に push 済みならそれを使い、無ければこの実行時点の
          # コミットに新規作成する（gh release create の標準動作）。
          gh release create "v${{ steps.ver.outputs.version }}" --draft \
            --title "dirlens v${{ steps.ver.outputs.version }}" \
            release/*
